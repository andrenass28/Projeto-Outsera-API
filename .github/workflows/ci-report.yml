name: Cypress Tests with Report

on:
  push:
    branches:
      - '**'

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests and generate report
        run: |
          npx cypress run --reporter mochawesome --reporter-options reportDir=results,reportFilename=cypress-report,overwrite=true,html=true,json=true

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: results/
